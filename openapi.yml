openapi: 3.0.3
info:
  title: Helm Chart Repository API
  description: >-
    The Helm Chart Repository API defines the HTTP endpoints used by Helm
    clients to discover and download Helm charts. A chart repository is an
    HTTP server that houses an index.yaml file and optionally packaged
    charts (.tgz files). The index.yaml file contains metadata about each
    chart in the repository, including download URLs and version information.
    This API specification documents the standard endpoints that any
    Helm-compatible chart repository must implement.
  version: 1.0.0
  contact:
    name: Helm Project
    url: https://helm.sh
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: Helm Chart Repository Guide
  url: https://helm.sh/docs/topics/chart_repository/
servers:
  - url: https://{repository-host}
    description: Helm Chart Repository Server
    variables:
      repository-host:
        default: charts.example.com
        description: The hostname of the chart repository
paths:
  /index.yaml:
    get:
      operationId: getRepositoryIndex
      summary: Get Repository Index
      description: >-
        Retrieves the repository index file which contains metadata about
        all charts available in the repository. The index.yaml file lists
        every chart version along with its description, maintainers,
        download URLs, and content digests. Helm clients use this endpoint
        to search and resolve chart dependencies.
      tags:
        - Repository
      responses:
        '200':
          description: Repository index returned successfully
          content:
            application/x-yaml:
              schema:
                $ref: '#/components/schemas/RepositoryIndex'
            text/yaml:
              schema:
                $ref: '#/components/schemas/RepositoryIndex'
        '404':
          description: Repository index not found
  /charts/{chartName}-{version}.tgz:
    get:
      operationId: downloadChartPackage
      summary: Download Chart Package
      description: >-
        Downloads a packaged Helm chart archive (.tgz file) for a specific
        chart name and version. The archive contains the Chart.yaml,
        values.yaml, templates, and other chart files. Helm clients use
        this endpoint after resolving chart references from the index.
      tags:
        - Charts
      parameters:
        - name: chartName
          in: path
          required: true
          description: The name of the chart to download
          schema:
            type: string
            example: nginx
        - name: version
          in: path
          required: true
          description: The semantic version of the chart
          schema:
            type: string
            example: 1.2.3
      responses:
        '200':
          description: Chart package returned successfully
          content:
            application/gzip:
              schema:
                type: string
                format: binary
            application/x-tar:
              schema:
                type: string
                format: binary
        '404':
          description: Chart package not found
  /charts/{chartName}-{version}.tgz.prov:
    get:
      operationId: downloadChartProvenance
      summary: Download Chart Provenance File
      description: >-
        Downloads the provenance file for a specific chart version. The
        provenance file contains a PGP signature that can be used to verify
        the integrity and origin of the chart package. This endpoint is
        optional and only available for signed charts.
      tags:
        - Charts
      parameters:
        - name: chartName
          in: path
          required: true
          description: The name of the chart
          schema:
            type: string
            example: nginx
        - name: version
          in: path
          required: true
          description: The semantic version of the chart
          schema:
            type: string
            example: 1.2.3
      responses:
        '200':
          description: Provenance file returned successfully
          content:
            application/pgp-signature:
              schema:
                type: string
        '404':
          description: Provenance file not found
  /api/charts:
    get:
      operationId: listAllCharts
      summary: List All Charts
      description: >-
        Returns a list of all charts available in the repository. This
        endpoint is provided by ChartMuseum and other enhanced chart
        repository implementations. It returns chart metadata grouped
        by chart name.
      tags:
        - ChartMuseum
      responses:
        '200':
          description: Chart list returned successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/ChartVersion'
  /api/charts/{chartName}:
    get:
      operationId: getChartVersions
      summary: Get Chart Versions
      description: >-
        Returns all available versions for a specific chart. This endpoint
        is provided by ChartMuseum and other enhanced chart repository
        implementations.
      tags:
        - ChartMuseum
      parameters:
        - name: chartName
          in: path
          required: true
          description: The name of the chart
          schema:
            type: string
      responses:
        '200':
          description: Chart versions returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChartVersion'
        '404':
          description: Chart not found
    post:
      operationId: uploadChart
      summary: Upload Chart Package
      description: >-
        Uploads a new chart package to the repository. This endpoint is
        provided by ChartMuseum and other writable chart repository
        implementations. The chart archive is sent as multipart form data.
      tags:
        - ChartMuseum
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                chart:
                  type: string
                  format: binary
                  description: The chart package archive (.tgz file)
                prov:
                  type: string
                  format: binary
                  description: Optional provenance file (.tgz.prov)
      responses:
        '201':
          description: Chart uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved:
                    type: boolean
                    example: true
        '409':
          description: Chart version already exists
  /api/charts/{chartName}/{version}:
    get:
      operationId: getChartVersion
      summary: Get Specific Chart Version
      description: >-
        Returns metadata for a specific version of a chart. This endpoint
        is provided by ChartMuseum and other enhanced chart repository
        implementations.
      tags:
        - ChartMuseum
      parameters:
        - name: chartName
          in: path
          required: true
          description: The name of the chart
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: The semantic version of the chart
          schema:
            type: string
      responses:
        '200':
          description: Chart version metadata returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartVersion'
        '404':
          description: Chart version not found
    delete:
      operationId: deleteChartVersion
      summary: Delete Chart Version
      description: >-
        Deletes a specific version of a chart from the repository. This
        endpoint is provided by ChartMuseum and other writable chart
        repository implementations.
      tags:
        - ChartMuseum
      parameters:
        - name: chartName
          in: path
          required: true
          description: The name of the chart
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: The semantic version of the chart
          schema:
            type: string
      responses:
        '200':
          description: Chart version deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                    example: true
        '404':
          description: Chart version not found
components:
  schemas:
    RepositoryIndex:
      type: object
      description: >-
        The repository index file that lists all available charts and their
        versions. This is the primary discovery mechanism for Helm clients.
      required:
        - apiVersion
        - entries
      properties:
        apiVersion:
          type: string
          description: The API version of the index file
          example: v1
        generated:
          type: string
          format: date-time
          description: Timestamp when the index was generated
        entries:
          type: object
          description: >-
            Map of chart names to their available versions. Each key is a
            chart name and the value is a list of chart version metadata.
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/ChartVersion'
    ChartVersion:
      type: object
      description: >-
        Metadata describing a specific version of a Helm chart, as it
        appears in the repository index.
      required:
        - apiVersion
        - name
        - version
      properties:
        apiVersion:
          type: string
          description: The chart API version (v1 or v2)
          enum:
            - v1
            - v2
          example: v2
        name:
          type: string
          description: The name of the chart
          example: nginx
        version:
          type: string
          description: The SemVer 2 version of the chart
          example: 1.2.3
        kubeVersion:
          type: string
          description: >-
            A SemVer range of compatible Kubernetes versions
          example: '>= 1.19.0'
        description:
          type: string
          description: A single-sentence description of the chart
        type:
          type: string
          description: The type of the chart
          enum:
            - application
            - library
          default: application
        keywords:
          type: array
          items:
            type: string
          description: Keywords associated with the chart
        home:
          type: string
          format: uri
          description: The URL of the project home page
        sources:
          type: array
          items:
            type: string
            format: uri
          description: URLs to source code for the chart
        maintainers:
          type: array
          items:
            $ref: '#/components/schemas/Maintainer'
        icon:
          type: string
          format: uri
          description: URL to an SVG or PNG icon for the chart
        appVersion:
          type: string
          description: >-
            The version of the application contained in the chart
          example: 1.21.0
        deprecated:
          type: boolean
          description: Whether this chart version is deprecated
          default: false
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Annotations for the chart
        urls:
          type: array
          items:
            type: string
            format: uri
          description: Download URLs for the chart package
        created:
          type: string
          format: date-time
          description: Timestamp when this version was created
        digest:
          type: string
          description: SHA-256 digest of the chart package
          example: sha256:abc123def456
    Maintainer:
      type: object
      description: Describes a chart maintainer
      required:
        - name
      properties:
        name:
          type: string
          description: The maintainer name
        email:
          type: string
          format: email
          description: The maintainer email address
        url:
          type: string
          format: uri
          description: The maintainer URL
    Dependency:
      type: object
      description: Describes a chart dependency
      required:
        - name
        - version
      properties:
        name:
          type: string
          description: The name of the dependency chart
        version:
          type: string
          description: The SemVer range of the dependency
        repository:
          type: string
          format: uri
          description: The repository URL for the dependency
        condition:
          type: string
          description: >-
            A YAML path that resolves to a boolean to enable/disable the
            dependency
        tags:
          type: array
          items:
            type: string
          description: Tags used to group dependencies for enable/disable
        import-values:
          type: array
          items:
            type: string
          description: >-
            Mapping of source values to parent key to import
        alias:
          type: string
          description: Alias to use for the dependency chart
tags:
  - name: Repository
    description: >-
      Standard Helm chart repository endpoints for index and chart
      download. These endpoints are required for any Helm-compatible
      chart repository.
  - name: Charts
    description: >-
      Chart package download endpoints for retrieving packaged chart
      archives and provenance files.
  - name: ChartMuseum
    description: >-
      Extended API endpoints provided by ChartMuseum and compatible
      chart repository servers. These endpoints provide JSON-based
      chart management capabilities beyond the basic repository spec.
